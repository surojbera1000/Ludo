<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#1f2933" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Ludo — Pass & Play</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/svg+xml" href="icons/icon.svg" />
  <link rel="apple-touch-icon" href="icons/icon.svg" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- ===== Setup screen ===== -->
  <section id="setup" class="screen active">
    <div class="setup-card">
      <h1 class="logo">LUDO</h1>
      <p class="tagline">Pass &amp; Play · 2–4 players</p>

      <div class="field">
        <label>Number of players</label>
        <div id="count-group" class="seg">
          <button class="seg-btn" data-count="2">2</button>
          <button class="seg-btn active" data-count="3">3</button>
          <button class="seg-btn" data-count="4">4</button>
        </div>
      </div>

      <div class="field">
        <label>Players</label>
        <div id="player-rows" class="player-rows"></div>
      </div>

      <button id="start-btn" class="primary-btn">Start Game</button>
      <p class="hint">Roll a 6 to bring a token out. Land on an opponent to send it home. First to get all 4 tokens home wins.</p>
    </div>
  </section>

  <!-- ===== Game screen ===== -->
  <section id="game" class="screen">
    <header id="status-bar" class="status-bar">
      <div id="turn-pill" class="turn-pill">
        <span class="dot"></span>
        <span id="turn-name">Red</span>
      </div>
      <div id="message" class="message">Tap the dice to roll</div>
      <button id="menu-btn" class="icon-btn" aria-label="Menu">⋯</button>
    </header>

    <div class="board-wrap">
      <div id="board" class="board"><!-- cells + tokens injected here --></div>
    </div>

    <footer class="controls">
      <div id="player-strip" class="player-strip"><!-- per-player chips --></div>
      <button id="dice" class="dice" aria-label="Roll dice">
        <span id="dice-face" class="dice-face">🎲</span>
      </button>
    </footer>
  </section>

  <!-- ===== Win modal ===== -->
  <div id="overlay" class="overlay">
    <div class="modal">
      <h2 id="modal-title">🏆 Red wins!</h2>
      <ol id="ranking" class="ranking"></ol>
      <div class="modal-actions">
        <button id="rematch-btn" class="primary-btn">Play Again</button>
        <button id="newgame-btn" class="ghost-btn">New Setup</button>
      </div>
    </div>
  </div>

  <!-- menu sheet -->
  <div id="menu-sheet" class="overlay">
    <div class="modal">
      <h2>Menu</h2>
      <div class="modal-actions">
        <button id="resume-btn" class="primary-btn">Resume</button>
        <button id="quit-btn" class="ghost-btn">Quit to Setup</button>
      </div>
    </div>
  </div>

  <script src="js/board.js"></script>
  <script src="js/game.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(() => {}));
    }
  </script>
</body>
</html>
